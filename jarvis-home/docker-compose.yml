services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "20008:20008"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jerusalem
      - WEBUI_PORT=20008
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://localhost:20008/ | grep -q '[23][0-9][0-9]\\|403'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${HOME}/jarvis/qbittorrent-config:/config
      - ${HOME}/shared-storage-2/downloads:/downloads
      - ${HOME}/shared-storage-2/movies:/media/movies
      - ${HOME}/shared-storage-2/tv-shows:/media/tv-shows
      - ${HOME}/jarvis/scripts:/scripts:ro
      - ${HOME}/jarvis/qbittorrent-init:/custom-cont-init.d:ro
