services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "20008:20008"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jerusalem
      - WEBUI_PORT=20008
    volumes:
      - ${HOME}/jarvis/qbittorrent-config:/config
      - ${HOME}/shared-storage-2/downloads:/downloads
      - ${HOME}/shared-storage-2/movies:/media/movies
      - ${HOME}/shared-storage-2/tv-shows:/media/tv-shows
      - ${HOME}/jarvis/scripts:/scripts:ro
