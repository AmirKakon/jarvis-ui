services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jarvis-postgres
    restart: unless-stopped
    ports:
      - "20004:5432"
    environment:
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jarvis123}
      - POSTGRES_DB=jarvis
    volumes:
      - ${HOME}/jarvis/postgres-data:/var/lib/postgresql/data

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "20008:20008"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jerusalem
      - WEBUI_PORT=20008
    volumes:
      - ${HOME}/jarvis/qbittorrent-config:/config
      - ${HOME}/shared-storage-2/downloads:/downloads
      - ${HOME}/shared-storage-2/movies:/media/movies
      - ${HOME}/shared-storage-2/tv-shows:/media/tv-shows
      - ${HOME}/jarvis/scripts:/scripts:ro
      - ${HOME}/jarvis/qbittorrent-init:/custom-cont-init.d:ro
